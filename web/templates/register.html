{% extends "base.html" %}
{% block title %}Cadastro | Greew{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-panel">
    <p class="kicker">Cadastro</p>
    <h1 class="register-title">Novo usuário operador</h1>
    <p class="muted">Usuários cadastrados já podem entrar e cotar normalmente.</p>

    <form method="post" class="card form-grid">
      <label>E-mail
        <input type="email" name="email" required autocomplete="email">
      </label>
      <label>Senha
        <input type="password" name="password" minlength="6" required>
      </label>
      <div class="actions-row">
        <button class="btn btn-primary" type="submit">Criar usuário</button>
        <a class="btn btn-ghost" href="{{ url_for('login') }}">Voltar ao login</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}

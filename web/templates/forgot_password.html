{% extends "base.html" %}
{% block title %}Recuperar senha | Greew{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-panel">
    <p class="kicker">Acesso</p>
    <h1 class="register-title">Esqueceu a senha?</h1>
    <div class="card form-grid">
      <p class="muted">
        Para redefinir sua senha, entre em contato com o usuário master da operação.
      </p>
      <p class="mono small first-access-meta">Master: {{ master_username }}</p>
      <a class="btn btn-primary" href="{{ url_for('login') }}">Voltar ao login</a>
    </div>
  </div>
</section>
{% endblock %}

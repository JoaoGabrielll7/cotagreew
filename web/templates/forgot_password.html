{% extends "base.html" %}
{% block title %}Recuperar senha | Greew{% endblock %}
{% block content %}
<section class="auth-layout forgot-layout center-auth-layout" style="max-width: 620px; margin: 0 auto;">
  <div class="auth-panel forgot-panel center-auth-panel" style="width: 100%; margin: 0 auto; text-align: center;">
    <p class="kicker">Acesso</p>
    <h1 class="register-title forgot-title">Esqueceu a senha?</h1>
    <p class="muted">Informe seu e-mail e defina uma nova senha.</p>

    <form method="post" class="card form-grid forgot-card">
      <label>E-mail
        <input type="email" name="email" required autocomplete="username">
      </label>
      <label>Nova senha
        <input type="password" name="password" minlength="6" required autocomplete="new-password">
      </label>
      <label>Confirmar nova senha
        <input type="password" name="confirm_password" minlength="6" required autocomplete="new-password">
      </label>
      <button class="btn btn-primary" type="submit">Redefinir senha</button>
      <a class="btn btn-ghost" href="{{ url_for('login') }}">Voltar ao login</a>
    </form>
  </div>
</section>
{% endblock %}
